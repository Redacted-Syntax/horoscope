<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pen</title>
  </head>
  <body>
    <div id="input-container" class="inputContainer">
      <form>
        <h1>Zodiac Sign Form</h1>

        <label for="sign-selector">Choose your zodiac sign:</label>

        <select id="sign-selector">
          <option value="">Select a sign</option>
        </select>

        <button>Submit</button>
      </form>
    </div>
    <div id="results-container" class="">
      <img id="zodiac-image" src="" alt="Zodiac Sign" class="img gone" />
      <p id="zodiac-sign" class="sign"></p>

      <p id="zodiac-date" class="date"></p>

      <p id="zodiac-message" class="msg"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
